name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read
  security-events: write

jobs:
  detect-changes:
    name: Detect Changed Apps
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.changed.outputs.apps }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Detect changed apps
        id: changed
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep '^apps/' \
            | cut -d/ -f2 \
            | sort -u \
            | jq -R . | jq -sc .)
          if [ "$CHANGED" = "[]" ]; then
            CHANGED='["nodejs-api","python-api","java-api","nginx-proxy"]'
          fi
          echo "apps=$CHANGED" >> "$GITHUB_OUTPUT"

  sast:
    name: SAST — ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.detect-changes.outputs.apps) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run Semgrep
        run: |
          pip install semgrep --quiet
          semgrep scan --config=auto --error apps/${{ matrix.app }} \
            --sarif-output=semgrep-${{ matrix.app }}.sarif || true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          sarif_file: semgrep-${{ matrix.app }}.sarif
          category: semgrep-${{ matrix.app }}

  sca:
    name: SCA — ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.detect-changes.outputs.apps) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Trivy SCA on dependencies
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: apps/${{ matrix.app }}
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: '1'
          format: table

  build:
    name: Build — ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.detect-changes.outputs.apps) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Log in to GHCR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PLATFORM_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: apps/${{ matrix.app }}
          push: false
          load: true
          tags: ${{ matrix.app }}:pr-${{ github.event.pull_request.number }}
          build-args: |
            BUILD_DATE=${{ github.event.pull_request.updated_at }}
            GIT_REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.app }}:pr-${{ github.event.pull_request.number }}
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: '1'
          format: table

  pr-summary:
    name: PR Check Summary
    runs-on: ubuntu-latest
    needs: [sast, sca, build]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.sast.result }}" == "failure" || \
                "${{ needs.sca.result }}" == "failure" || \
                "${{ needs.build.result }}" == "failure" ]]; then
            echo "One or more checks failed"
            exit 1
          fi
          echo "All checks passed"
