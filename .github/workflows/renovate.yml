name: Renovate

on:
  repository_dispatch:
    types: [renovate-run]
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'  # daily at 05:00 UTC as fallback

permissions:
  contents: write
  pull-requests: write

jobs:
  renovate:
    name: Run Renovate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: renovatebot/github-action@79dc0ba74dc3de28db0a7aeb1d0b95d5bf5fde2a # v46.1.13
        with:
          configurationFile: renovate.json
          token: ${{ secrets.PLATFORM_TOKEN }}
        env:
          RENOVATE_PLATFORM: github
          RENOVATE_ENDPOINT: https://api.github.com/
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_HOST_RULES: |
            [{"matchHost":"ghcr.io","username":"x-access-token","password":"${{ secrets.PLATFORM_TOKEN }}"}]
          LOG_LEVEL: info
