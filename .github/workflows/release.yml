name: Release

on:
  push:
    tags:
      - '*/v*'

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  parse-tag:
    name: Parse Tag
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.parse.outputs.app }}
      version: ${{ steps.parse.outputs.version }}
    steps:
      - name: Parse app and version from tag
        id: parse
        run: |
          TAG="${{ github.ref_name }}"
          APP="${TAG%%/*}"
          VERSION="${TAG##*/}"
          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  release:
    name: Build & Release — ${{ needs.parse-tag.outputs.app }}
    runs-on: ubuntu-latest
    needs: parse-tag
    env:
      APP: ${{ needs.parse-tag.outputs.app }}
      VERSION: ${{ needs.parse-tag.outputs.version }}
      IMAGE: ghcr.io/platform-images/${{ needs.parse-tag.outputs.app }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff9eeefa3bfb9c9f5cc # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build and push
        id: build
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: apps/${{ env.APP }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.VERSION }}
            ${{ env.IMAGE }}:latest
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            GIT_REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a # v3.8.1

      - name: Sign image (keyless)
        run: |
          cosign sign --yes \
            ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}

      - name: Generate SBOM
        uses: anchore/sbom-action@e11c554f704a0b820cbf8c51673f6945e0731532 # v0.20.0
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM
        uses: actions/attest-sbom@115c3be05ff3974bcbd596578934b3f9ce39bf68 # v2.2.0
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: sbom.spdx.json
          push-to-registry: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          name: ${{ env.APP }} ${{ env.VERSION }}
          body: |
            ## ${{ env.APP }} ${{ env.VERSION }}

            ### Image
            ```
            docker pull ${{ env.IMAGE }}:${{ env.VERSION }}
            docker pull ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
            ```

            ### Verify signature
            ```
            cosign verify \
              --certificate-identity-regexp="https://github.com/platform-images/app-reference-implementations" \
              --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
              ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
            ```

            ### Platforms
            `linux/amd64` `linux/arm64`
          files: sbom.spdx.json
