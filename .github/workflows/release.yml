name: Release

on:
  push:
    branches: [main]
    paths: ['apps/*/Dockerfile']
  workflow_dispatch:
    inputs:
      app:
        description: 'App to release'
        required: true
        default: all
        type: choice
        options: [all, nodejs-api, python-api, java-api, nginx-proxy]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  setup:
    name: Select apps
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.pick.outputs.apps }}
    steps:
      - id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.app }}" != "all" ]; then
            echo 'apps=["${{ inputs.app }}"]' >> "$GITHUB_OUTPUT"
          else
            echo 'apps=["nodejs-api","python-api","java-api","nginx-proxy"]' >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Release — ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.setup.outputs.apps) }}
    env:
      IMAGE: ghcr.io/platform-base-images/${{ matrix.app }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: apps/${{ matrix.app }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            GIT_REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a # v3.8.1

      - name: Sign image (keyless)
        run: |
          cosign sign --yes ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ matrix.app }}/sha-${{ github.sha }}
          name: ${{ matrix.app }} — ${{ github.sha }}
          body: |
            Triggered by base image digest update.

            **Pull:**
            ```
            docker pull ${{ env.IMAGE }}:latest
            docker pull ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
            ```

            **Verify signature:**
            ```
            cosign verify \
              --certificate-identity-regexp="https://github.com/platform-base-images/app-reference-implementations" \
              --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
              ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
            ```

            Platforms: `linux/amd64` `linux/arm64`
          files: sbom.spdx.json
