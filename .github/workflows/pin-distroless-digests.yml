name: Pin distroless digests

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  pin:
    name: Resolve and pin distroless digests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ secrets.PLATFORM_TOKEN }}

      - name: Install crane
        uses: imjasonh/setup-crane@31b88efe9de28ae0ffa220711af4b60be9435f6e # v0.4

      - name: Resolve and write distroless digest pins
        run: |
          set -euo pipefail

          crane auth login ghcr.io \
            --username x-access-token \
            --password "${{ secrets.PLATFORM_TOKEN }}"

          for dockerfile in apps/java-api/Dockerfile apps/nodejs-api/Dockerfile apps/python-api/Dockerfile; do
            image=$(grep -m1 '^FROM ghcr\.io/platform-base-images/' "$dockerfile" \
              | sed 's|FROM ghcr\.io/platform-base-images/\([^:]*\):.*|\1|')

            version=$(grep -m1 '^FROM ghcr\.io/platform-base-images/' "$dockerfile" \
              | grep -oP '\d+\.\d+\.\d+(?=@)')

            [ -z "$version" ] && continue

            distroless_ref="ghcr.io/platform-base-images/${image}:${version}-distroless"
            digest=$(crane digest "$distroless_ref")

            sed -i \
              "s|ghcr\.io/platform-base-images/${image}:[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*-distroless\(@sha256:[a-f0-9]*\)\?|ghcr.io/platform-base-images/${image}:${version}-distroless@${digest}|g" \
              "$dockerfile"

            echo "  ${dockerfile}: ${image}:${version}-distroless@${digest}"
          done

          git diff --quiet && echo "All distroless stages already digest-pinned." && exit 0

          git config user.name "platform-images"
          git config user.email "platform-images@users.noreply.github.com"

          BRANCH="chore/pin-distroless-digests-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add apps/*/Dockerfile
          git commit -m "chore: pin distroless runtime stages to digest"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: pin distroless runtime stages to digest" \
            --body "Adds @sha256 digest pins to the distroless runtime FROM lines in all three app Dockerfiles. Previously only the builder stages were digest-pinned; this brings the runtime stages to the same level.

After this PR merges, future digest updates are handled automatically by the sync-distroless workflow on every Renovate base-image PR." \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.PLATFORM_TOKEN }}